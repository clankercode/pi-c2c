name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      # Install the real c2c binary so the integration tests run instead of
      # self-skipping. c2c is an OCaml binary (not on npm) — fetched from its
      # GitHub releases.
      - name: Set up c2c
        uses: ./.github/actions/setup-c2c

      - name: Test
        run: pnpm test
